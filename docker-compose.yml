version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data:/root/.ollama   # model weights persisted across restarts
    ports:
      - "11434:11434"
    entrypoint: >
      /bin/bash -c "
        ollama serve &
        sleep 5 &&
        for model in ${OLLAMA_MODEL:-llama3.2:3b}; do ollama pull \$model; done &&
        wait"
    healthcheck:
      test: ["CMD-SHELL", "for model in ${OLLAMA_MODEL:-llama3.2:3b}; do ollama list | grep -F \"$model\" || exit 1; done"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  sqlite_data:
  ollama_data:
